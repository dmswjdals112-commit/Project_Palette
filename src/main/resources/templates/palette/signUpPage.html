<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<!-- head ------------------------------------------------------------------------------------->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ==================== 메인 컨테이너 ==================== */
        .signup-container {
            background: #FFFFFF;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 헤더 ==================== */
        .signup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .signup-title {
            font-size: 28px;
            font-weight: 700;
            color: #2C3E50;
            letter-spacing: 0.5px;
        }

        .back-button {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.3);
        }

        .back-button:hover {
            transform: translateX(-5px);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.5);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        /* ==================== 로고 섹션 ==================== */
        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFB6D9 0%, #FFC0CB 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 182, 217, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .logo-icon {
            font-size: 50px;
            color: white;
        }

        /* ==================== 입력 폼 ==================== */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: #87CEEB;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-input {
            padding: 14px 16px;
            border: 2px solid #E8F0F5;
            border-radius: 12px;
            font-size: 14px;
            color: #2C3E50;
            background: #F8FCFE;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-input::placeholder {
            color: #B0B0B0;
        }

        .form-input:focus {
            outline: none;
            border-color: #87CEEB;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.1);
        }

        .form-input:hover {
            border-color: #ADD8E6;
        }

        /* ==================== 입력 필드 래퍼 ==================== */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            font-size: 16px;
            display: none;
        }

        .input-icon.success {
            display: block;
            color: #4CAF50;
        }

        .input-icon.error {
            display: block;
            color: #FF6B6B;
        }

        .form-input.with-icon {
            padding-right: 45px;
        }

        /* ==================== 상태 표시 ==================== */
        .status-message {
            font-size: 12px;
            margin-top: 6px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.success {
            color: #4CAF50;
            display: block;
        }

        .status-message.error {
            color: #FF6B6B;
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 비밀번호 강도 인디케이터 ==================== */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            background: #E0E0E0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-bar.weak {
            background: #FF6B6B;
        }

        .strength-bar.medium {
            background: #FFD93D;
        }

        .strength-bar.strong {
            background: #4CAF50;
        }

        .strength-text {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            display: none;
        }

        .strength-text.show {
            display: block;
        }

        /* ==================== 이용약관 ==================== */
        .terms-section {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 25px 0;
            padding: 15px;
            background: #F8FCFE;
            border-radius: 12px;
            border: 1px solid #E8F0F5;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background: #FFFFFF;
            border: 2px solid #DDD;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .checkbox:hover {
            border-color: #87CEEB;
        }

        .checkbox:checked {
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            border-color: #87CEEB;
            position: relative;
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: -3px;
            left: 2px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .terms-text {
            flex: 1;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .terms-link {
            color: #87CEEB;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .terms-link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #FF6B6B;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ==================== 회원가입 버튼 ==================== */
        .signup-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.3);
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .signup-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(135, 206, 235, 0.4);
        }

        .signup-button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .signup-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .signup-button.loading .spinner {
            display: inline-block;
        }

        /* ==================== 로그인 링크 ==================== */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .login-link {
            color: #87CEEB;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-link:hover {
            color: #ADD8E6;
            text-decoration: underline;
        }

        /* ==================== 반응형 ==================== */
        @media (max-width: 480px) {
            .signup-container {
                padding: 40px 25px;
                border-radius: 25px;
            }

            .signup-title {
                font-size: 24px;
            }

            .form-input {
                padding: 12px 14px;
                font-size: 13px;
            }

            .signup-button {
                padding: 13px;
                font-size: 15px;
            }

            .terms-section {
                padding: 12px;
            }
        }

    </style>
</head>
<!-- head ------------------------------------------------------------------------------------->

<!-- body ------------------------------------------------------------------------------------->
<body>
    <div class="signup-container">
        <!-- 헤더 -->
        <div class="signup-header">
            <h1 class="signup-title">Sign Up</h1>
            <button class="back-button" onclick="goBack()" title="뒤로가기">←</button>
        </div>

        <!-- 에러 메시지 표시 -->
        <div th:if="${errorMessage}" class="error-message show" style="margin-bottom: 20px; padding: 15px; background: #FFE8E8; border: 1px solid #FF6B6B; border-radius: 8px;">
            <span th:text="${errorMessage}" style="color: #FF6B6B; font-weight: 500;"></span>
        </div>
        <div class="logo-section">
            <div class="logo-circle">
                <div class="logo-icon">♪</div>
            </div>
        </div>

        <!-- 회원가입 폼 -->
        <form method="post" th:action="@{/palette/signUpPage}" th:object="${userSignUp}" id="signupForm">
            <!-- 이메일 입력란 -->
            <div class="form-group">
                <label class="form-label">이메일</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        th:field="*{email}"
                        id="email"
                        class="form-input with-icon" 
                        placeholder="example@email.com"
                        autocomplete="email"
                        required>
                    <span class="input-icon"></span>
                </div>
                <div class="status-message" id="emailStatus"></div>
            </div>

            <!-- 비밀번호 입력 -->
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input 
                    type="password"
                    th:field="*{passwordHash}"
                    id="password" 
                    class="form-input" 
                    placeholder="최소 10자, 최대 20자)"
                    autocomplete="new-password"
                    minlength="10"
                    required
                >
                <div class="password-strength">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
                <div class="status-message" id="passwordStatus"></div>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label class="form-label">비밀번호 확인</label>
                <div class="input-wrapper">
                    <input 
                        type="password"
                        id="passwordConfirm"
                        class="form-input with-icon" 
                        placeholder="비밀번호를 다시 입력하세요"
                        autocomplete="new-password"
                        required
                    >
                    <span class="input-icon"></span>
                </div>
                <div class="status-message" id="confirmStatus"></div>
            </div>

            <!-- 닉네임 입력 -->
            <div class="form-group">
                <label class="form-label">닉네임</label>
                <input 
                    type="text"
                    th:field="*{username}"
                    id="name" 
                    class="form-input" 
                    placeholder="닉네임을 입력하세요 2~20자"
                    autocomplete="name"
                    required
                >
                <div class="status-message" id="nameStatus"></div>
            </div>

            <!-- 이용약관 동의 -->
            <div class="terms-section">
                <input type="checkbox" id="terms" class="checkbox" required>
                <div class="terms-text">
                    <span class="terms-link" onclick="showTerms()">이용약관</span>과 
                    <span class="terms-link" onclick="showPrivacy()">개인정보 처리방침</span>에 동의합니다
                </div>
            </div>
            <div class="error-message" id="termsError"></div>

            <!-- 회원가입 버튼 -->
            <button type="submit" class="signup-button" id="signupBtn" name="cmd" value="save" onclick="return validateForm()">
                <span class="spinner"></span>
                회원가입
            </button>
        </form>

        <!-- 로그인 링크 -->
        <div class="login-section">
            <span>이미 계정이 있으신가요?</span>
            <a href="/login" class="login-link">로그인</a>
        </div>
    </div>

        // 이용약관 표시
        function showTerms() {
            alert('이용약관\n\n음악 플레이어 서비스를 이용해주셔서 감사합니다.\n자세한 내용은 웹사이트를 참고하세요.');

        // 개인정보 처리방침 표시
        function showPrivacy() {
            alert('개인정보 처리방침\n\n귀하의 개인정보는 보호됩니다.\n자세한 내용은 웹사이트를 참고하세요.');

        // 엔터키로 회원가입
