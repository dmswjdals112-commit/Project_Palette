<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<!-- head ------------------------------------------------------------------------------------->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Upload Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 50%, #ADD8E6 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ==================== 메인 컨테이너 ==================== */
        .upload-container {
            background: #FFFFFF;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 헤더 ==================== */
        .upload-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .upload-title {
            font-size: 28px;
            font-weight: 700;
            color: #2C3E50;
            letter-spacing: 0.5px;
        }

        .back-button {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.3);
        }

        .back-button:hover {
            transform: translateX(-5px);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.5);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        /* ==================== 로고 섹션 ==================== */
        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFB6D9 0%, #FFC0CB 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 182, 217, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .logo-icon {
            font-size: 50px;
            color: white;
        }

        /* ==================== 입력 폼 ==================== */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: #87CEEB;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .form-input {
            padding: 15px 18px;
            border: 2px solid #E8F0F5;
            border-radius: 12px;
            font-size: 15px;
            color: #2C3E50;
            background: #F8FCFE;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-input::placeholder {
            color: #B0B0B0;
        }

        .form-input:focus {
            outline: none;
            border-color: #87CEEB;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.1);
        }

        .form-input:hover {
            border-color: #ADD8E6;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 100px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ==================== 파일 업로드 ==================== */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-input {
            display: none;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 2px dashed #87CEEB;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.05) 0%, rgba(173, 216, 230, 0.05) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 15px;
        }

        .file-upload-label:hover {
            background: linear-gradient(135deg, rgba(135, 206, 235, 0.15) 0%, rgba(173, 216, 230, 0.15) 100%);
            border-color: #ADD8E6;
        }

        .file-upload-icon {
            font-size: 40px;
        }

        .file-upload-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .file-upload-title {
            font-weight: 700;
            color: #87CEEB;
            font-size: 14px;
        }

        .file-upload-subtitle {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .file-name-display {
            font-size: 13px;
            color: #4CAF50;
            margin-top: 8px;
            display: none;
        }

        .file-name-display.show {
            display: block;
        }

        /* ==================== 이미지 미리보기 ==================== */
        .image-preview-wrapper {
            margin-bottom: 25px;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #FFB6D9 0%, #FFC0CB 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-remove-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .image-remove-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .image-remove-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== 진행 바 ==================== */
        .progress-section {
            margin-bottom: 25px;
            display: none;
        }

        .progress-section.show {
            display: block;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 700;
            color: #87CEEB;
            margin-bottom: 8px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #87CEEB 0%, #ADD8E6 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(135, 206, 235, 0.6);
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        /* ==================== 업로드 버튼 ==================== */
        .upload-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(135, 206, 235, 0.3);
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(135, 206, 235, 0.4);
        }

        .upload-button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .upload-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .upload-button.loading .spinner {
            display: inline-block;
        }

        .upload-button.loading {
            pointer-events: none;
        }

        /* ==================== 에러 메시지 ==================== */
        .error-message {
            color: #FF6B6B;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        /* ==================== 성공 메시지 ==================== */
        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4CAF50;
            border-radius: 12px;
            padding: 15px;
            color: #4CAF50;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 안내 텍스트 ==================== */
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            line-height: 1.5;
        }

        /* ==================== 반응형 ==================== */
        @media (max-width: 480px) {
            .upload-container {
                padding: 40px 25px;
                border-radius: 25px;
            }

            .upload-title {
                font-size: 24px;
            }

            .form-input {
                padding: 13px 15px;
                font-size: 14px;
            }

            .upload-button {
                padding: 13px;
                font-size: 15px;
            }

            .logo-circle {
                width: 80px;
                height: 80px;
            }

            .logo-icon {
                font-size: 40px;
            }

            .image-preview {
                height: 150px;
                font-size: 40px;
            }
        }

    </style>
</head>
<!-- head ------------------------------------------------------------------------------------->

<!-- body ------------------------------------------------------------------------------------->
<body>
    <div class="upload-container">
        <!-- 헤더 -->
        <div class="upload-header">
            <h1 class="upload-title">음원 등록</h1>
            <button class="back-button" onclick="goBack()" title="뒤로가기">←</button>
        </div>

        <!-- 로고 -->
        <div class="logo-section">
            <div class="logo-circle">
                <div class="logo-icon">♪</div>
            </div>
        </div>

        <!-- 성공 메시지 -->
        <div class="success-message" id="successMessage">
            ✓ 음원이 성공적으로 등록되었습니다!
        </div>

        <!-- 등록 폼 -->
        <form id="uploadForm">
            <!-- 음악 제목 -->
            <div class="form-group">
                <label class="form-label">음악 제목 *</label>
                <input 
                    type="text" 
                    id="title" 
                    class="form-input" 
                    placeholder="음악 제목을 입력하세요"
                    required
                >
                <div class="error-message" id="titleError"></div>
            </div>

            <!-- 아티스트 이름 -->
            <div class="form-group">
                <label class="form-label">아티스트 *</label>
                <input 
                    type="text" 
                    id="artist" 
                    class="form-input" 
                    placeholder="아티스트 이름을 입력하세요"
                    required
                >
                <div class="error-message" id="artistError"></div>
            </div>

            <!-- 앨범 이름 -->
            <div class="form-group">
                <label class="form-label">앨범 (선택사항)</label>
                <input 
                    type="text" 
                    id="album" 
                    class="form-input" 
                    placeholder="앨범 이름을 입력하세요"
                >
            </div>

            <!-- 장르 -->
            <div class="form-group">
                <label class="form-label">장르 *</label>
                <select id="genre" class="form-input" required>
                    <option value="">장르를 선택하세요</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="hiphop">Hip Hop</option>
                    <option value="jazz">Jazz</option>
                    <option value="classical">Classical</option>
                    <option value="electronic">Electronic</option>
                    <option value="kpop">K-POP</option>
                    <option value="indie">Indie</option>
                    <option value="ballad">Ballad</option>
                    <option value="other">Other</option>
                </select>
                <div class="error-message" id="genreError"></div>
            </div>

            <!-- 설명 -->
            <div class="form-group">
                <label class="form-label">설명 (선택사항)</label>
                <textarea 
                    id="description" 
                    class="form-input" 
                    placeholder="음악에 대한 설명을 입력하세요"
                ></textarea>
            </div>

            <!-- 음악 파일 업로드 -->
            <div class="form-group">
                <label class="form-label">음악 파일 *</label>
                <div class="file-upload-wrapper">
                    <input 
                        type="file" 
                        id="musicFile" 
                        class="file-upload-input" 
                        accept="audio/*"
                        required
                    >
                    <label for="musicFile" class="file-upload-label">
                        <span class="file-upload-icon">🎵</span>
                        <div class="file-upload-text">
                            <span class="file-upload-title">음악 파일을 선택하세요</span>
                            <span class="file-upload-subtitle">MP3, WAV, FLAC 등 지원</span>
                        </div>
                    </label>
                    <div class="file-name-display" id="musicFileName"></div>
                </div>
                <div class="error-message" id="musicFileError"></div>
                <div class="help-text">최대 100MB까지 업로드 가능합니다</div>
            </div>

            <!-- 앨범 아트 업로드 -->
            <div class="form-group">
                <label class="form-label">앨범 아트 (선택사항)</label>
                <div class="file-upload-wrapper">
                    <input 
                        type="file" 
                        id="imageFile" 
                        class="file-upload-input" 
                        accept="image/*"
                    >
                    <label for="imageFile" class="file-upload-label">
                        <span class="file-upload-icon">🖼️</span>
                        <div class="file-upload-text">
                            <span class="file-upload-title">이미지 파일을 선택하세요</span>
                            <span class="file-upload-subtitle">JPG, PNG, GIF 등 지원</span>
                        </div>
                    </label>
                    <div class="file-name-display" id="imageFileName"></div>
                </div>
            </div>

            <!-- 이미지 미리보기 -->
            <div class="image-preview-wrapper" id="imagePreviewWrapper" style="display: none;">
                <div class="image-preview" id="imagePreview">
                    <img id="previewImage" alt="앨범 아트 미리보기">
                </div>
                <button type="button" class="image-remove-btn" onclick="removeImage()">이미지 제거</button>
            </div>

            <!-- 진행 바 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-label">업로드 진행률</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <!-- 업로드 버튼 -->
            <button type="submit" class="upload-button" id="uploadBtn">
                <span class="spinner"></span>
                음원 등록
            </button>
        </form>

        <div class="help-text" style="text-align: center; margin-top: 20px;">
            💡 팁: 좋은 품질의 앨범 아트와 정확한 정보를 입력하면 더 많은 청취자가 당신의 음악을 발견할 수 있습니다.
        </div>
    </div>

    <script>
        // 뒤로가기
        function goBack() {
            window.history.back();
        }

        // 폼 제출
        document.getElementById('uploadForm').addEventListener('submit', handleUpload);

        // 음악 파일 선택
        document.getElementById('musicFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const fileName = document.getElementById('musicFileName');
            const error = document.getElementById('musicFileError');

            error.classList.remove('show');
            fileName.classList.remove('show');

            if (file) {
                const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
                
                if (file.size > 100 * 1024 * 1024) {
                    error.textContent = '파일 크기가 100MB를 초과합니다';
                    error.classList.add('show');
                    e.target.value = '';
                    return;
                }

                fileName.textContent = `✓ ${file.name} (${sizeInMB}MB)`;
                fileName.classList.add('show');
            }
        });

        // 이미지 파일 선택
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const fileName = document.getElementById('imageFileName');
            const previewWrapper = document.getElementById('imagePreviewWrapper');

            fileName.classList.remove('show');
            previewWrapper.style.display = 'none';

            if (file) {
                fileName.textContent = `✓ ${file.name}`;
                fileName.classList.add('show');

                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('previewImage').src = event.target.result;
                    previewWrapper.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 이미지 제거
        function removeImage() {
            document.getElementById('imageFile').value = '';
            document.getElementById('imagePreviewWrapper').style.display = 'none';
            document.getElementById('imageFileName').classList.remove('show');
        }

        // 업로드 처리
        function handleUpload(e) {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const artist = document.getElementById('artist').value.trim();
            const genre = document.getElementById('genre').value;
            const musicFile = document.getElementById('musicFile').files[0];
            const imageFile = document.getElementById('imageFile').files[0];
            const uploadBtn = document.getElementById('uploadBtn');
            const successMessage = document.getElementById('successMessage');

            // 에러 메시지 초기화
            document.getElementById('titleError').classList.remove('show');
            document.getElementById('artistError').classList.remove('show');
            document.getElementById('genreError').classList.remove('show');
            document.getElementById('musicFileError').classList.remove('show');
            successMessage.classList.remove('show');

            // 검증
            let isValid = true;

            if (!title) {
                document.getElementById('titleError').textContent = '제목을 입력하세요';
                document.getElementById('titleError').classList.add('show');
                isValid = false;
            }

            if (!artist) {
                document.getElementById('artistError').textContent = '아티스트를 입력하세요';
                document.getElementById('artistError').classList.add('show');
                isValid = false;
            }

            if (!genre) {
                document.getElementById('genreError').textContent = '장르를 선택하세요';
                document.getElementById('genreError').classList.add('show');
                isValid = false;
            }

            if (!musicFile) {
                document.getElementById('musicFileError').textContent = '음악 파일을 선택하세요';
                document.getElementById('musicFileError').classList.add('show');
                isValid = false;
            }

            if (!isValid) {
                return;
            }

            // 폼 데이터 생성
            const formData = new FormData();
            formData.append('title', title);
            formData.append('artist', artist);
            formData.append('album', document.getElementById('album').value.trim());
            formData.append('genre', genre);
            formData.append('description', document.getElementById('description').value.trim());
            formData.append('musicFile', musicFile);
            if (imageFile) {
                formData.append('imageFile', imageFile);
            }

            // 로딩 상태
            uploadBtn.classList.add('loading');
            uploadBtn.disabled = true;
            document.getElementById('progressSection').classList.add('show');

            // 업로드 요청
            const xhr = new XMLHttpRequest();

            // 진행 상황 추적
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    document.getElementById('progressBarFill').style.width = percentComplete + '%';
                    document.getElementById('progressText').textContent = Math.round(percentComplete) + '%';
                }
            });

            xhr.addEventListener('load', function() {
                uploadBtn.classList.remove('loading');
                uploadBtn.disabled = false;

                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    if (response.success) {
                        // 성공
                        successMessage.classList.add('show');
                        document.getElementById('uploadForm').reset();
                        removeImage();
                        document.getElementById('progressSection').classList.remove('show');
                        
                        setTimeout(() => {
                            // 3초 후 목록 페이지로 이동
                            window.location.href = '/song/list';
                        }, 2000);
                    } else {
                        alert(response.message || '업로드 중 오류가 발생했습니다');
                        document.getElementById('progressSection').classList.remove('show');
                    }
                } else {
                    alert('업로드 중 오류가 발생했습니다');
                    document.getElementById('progressSection').classList.remove('show');
                }
            });

            xhr.addEventListener('error', function() {
                uploadBtn.classList.remove('loading');
                uploadBtn.disabled = false;
                alert('업로드 중 오류가 발생했습니다');
                document.getElementById('progressSection').classList.remove('show');
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        // 입력 필드에서 에러 제거
        document.getElementById('title').addEventListener('input', function() {
            document.getElementById('titleError').classList.remove('show');
        });

        document.getElementById('artist').addEventListener('input', function() {
            document.getElementById('artistError').classList.remove('show');
        });

        document.getElementById('genre').addEventListener('change', function() {
            document.getElementById('genreError').classList.remove('show');
        });
    </script>
